    document.getElementById("works").innerHTML = WORKS.map(function (w) {
      return (

          '<a href="piece.html?id=' + w.id + '">' +
            '<figure>' +
              '<img src="' + w.image + '" width="' + w.w + '" height="' + w.h + '" alt="' + w.title + ' — ' + w.medium + '" loading="lazy">' +

          '</a>' +
        '</li>'
      );
    }).join("");
